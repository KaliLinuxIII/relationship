<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time Since Official ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;

    background:
        linear-gradient(
            rgba(255,80,150,0.45),
            rgba(255,80,150,0.45)
        ),
        url("YOUR_IMAGE_URL_HERE");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

/* Floating Hearts */

.hearts{
    position:fixed;
    width:100%;
    height:100%;
    overflow:hidden;
    z-index:0;
}

.heart{
    position:absolute;
    color:rgba(255,255,255,.25);
    animation:float linear infinite;
    user-select:none;
}

@keyframes float{
    from{
        transform:translateY(110vh) rotate(0deg);
    }
    to{
        transform:translateY(-120vh) rotate(360deg);
    }
}

/* Card */

.container{
    position:relative;
    z-index:2;
    text-align:center;
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(10px);
    padding:40px;
    border-radius:25px;
    box-shadow:0 0 40px rgba(0,0,0,.3);
    width:90%;
    max-width:650px;
}

h1{
    font-size:3rem;
    margin-bottom:10px;
    text-shadow:0 0 20px hotpink;
}

.subtitle{
    font-size:1.3rem;
    margin-bottom:30px;
}

#time{
    font-size:2rem;
    line-height:1.7;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="hearts" id="hearts"></div>

<div class="container">
    <h1>Time Since Official:</h1>
    <div class="subtitle">March 29, 2026 • 10:35:37 AM</div>

    <div id="time"></div>
</div>

<script>

const startDate = new Date("2026-03-29T10:35:37");

function updateTimer(){

    const now = new Date();
    const diff = now - startDate;

    if(diff < 0){
        document.getElementById("time").innerHTML =
        "Waiting for the official date ❤️";
        return;
    }

    const ms = diff % 1000;

    const totalSeconds = Math.floor(diff/1000);
    const seconds = totalSeconds % 60;

    const totalMinutes = Math.floor(totalSeconds/60);
    const minutes = totalMinutes % 60;

    const totalHours = Math.floor(totalMinutes/60);
    const hours = totalHours % 24;

    const days = Math.floor(totalHours/24);


    // Months with decimal progress
    let months = (now.getFullYear() - startDate.getFullYear()) * 12;
    months += now.getMonth() - startDate.getMonth();

    const monthStart = new Date(
        startDate.getFullYear(),
        startDate.getMonth() + months,
        startDate.getDate(),
        startDate.getHours(),
        startDate.getMinutes(),
        startDate.getSeconds()
    );

    const nextMonth = new Date(
        startDate.getFullYear(),
        startDate.getMonth() + months + 1,
        startDate.getDate(),
        startDate.getHours(),
        startDate.getMinutes(),
        startDate.getSeconds()
    );

    const monthProgress = (now - monthStart) / (nextMonth - monthStart);

    const exactMonths = months + monthProgress;


    document.getElementById("time").innerHTML = `
         ${exactMonths.toFixed(6)} Months<br>
         ${days} Days<br>
         ${hours} Hours<br>
         ${minutes} Minutes<br>
         ${seconds} Seconds<br>
         ${ms.toString().padStart(3,"0")} Milliseconds
    `;
}

setInterval(updateTimer,1);
updateTimer();


// Create floating hearts

const hearts = document.getElementById("hearts");

for(let i=0;i<500;i++){

    const h = document.createElement("div");
    h.className = "heart";
    h.innerHTML = "❤";

    h.style.left = Math.random()*100+"vw";
    h.style.fontSize = (15+Math.random()*40)+"px";
    h.style.animationDuration = (8+Math.random()*12)+"s";
    h.style.animationDelay = (-Math.random()*20)+"s";
    h.style.opacity = Math.random()*0.7+0.2;

    hearts.appendChild(h);
}

</script>

</body>
</html>
